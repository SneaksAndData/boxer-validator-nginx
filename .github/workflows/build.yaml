name: Run tests with coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_NAME: Boxer.Validator.Nginx
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate_commit:
    name: Validate Code and Publish Coverage
    runs-on: ubuntu-latest-16-cores-arm-public
    permissions:
      id-token: write      # required for dependabot PRs
      pull-requests: write # required for dependabot PRs
      contents: read       # required for dependabot PRs
    if: ${{ github.ref != 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v5

      - name: Install minimal stable with clippy and rustfmt
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.2
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Install just, cargo-llvm-cov, cargo-nextest
        uses: taiki-e/install-action@v2.67.18
        with:
          tool: cargo-llvm-cov

      - uses: extractions/setup-just@v4

      - name: rustfmt Check
        uses: actions-rust-lang/rustfmt@v1

      - name: Setup integration tests
        run: just up

      - name: Generate code coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          lcov-file: ./lcov.info
